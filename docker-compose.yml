volumes:
  data:
  prometheus-data:
  grafana_data:

services:
  storage:
    image: minio/minio:latest
    command: server /data
    restart: always
    expose:
      - 9000
    environment:
      MINIO_ROOT_USER: ${Storage_AccessKey:-minioadmin}
      MINIO_ROOT_PASSWORD: ${Storage_Secret:-minioadmin}
      MINIO_PROMETHEUS_AUTH_TYPE: public
    volumes:
      - data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3

  createbuckets:
    image: minio/mc
    depends_on:
      - storage
    restart: on-failure
    entrypoint: >
      /bin/sh -c "
      until mc alias set storage http://storage:9000 ${Storage_AccessKey:-minioadmin} ${Storage_Secret:-minioadmin}; do
        echo 'Waiting for MinIO...';
        sleep 2;
      done &&
      mc mb --ignore-existing storage/${Storage_Bucket:-data} &&
      mc anonymous set download storage/${Storage_Bucket:-data} &&
      echo 'Bucket created and set to public download';
      exit 0;
      "

  uploader:
    build: ./uploader
    depends_on:
      - storage
      - createbuckets
    expose:
      - 3000
    environment:
      PORT: 3000
      S3_HOST: storage
      S3_PORT: 9000
      S3_ACCESS_KEY: ${Storage_AccessKey:-minioadmin}
      S3_ACCESS_SECRET: ${Storage_Secret:-minioadmin}
      S3_BUCKET: ${Storage_Bucket:-data}

  security:
    build: ./security
    expose:
      - 3000
    environment:
      PORT: 3000

  gateway:
    image: nginx:alpine
    volumes:
      - ./gateway/nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "80:8080"
    depends_on:
      - storage
      - uploader
      - security