events {
    worker_connections 1024;
}

http {
    upstream security_upstream {
        server security:3000;
    }

    upstream uploader_upstream {
        server uploader:3000;
    }

    # Добавляем upstream для MinIO
    upstream minio_upstream {
        server storage:9000;
    }

    map $http_authorization $token {
        default "";
        "~^Bearer\s+(?<bearer_token>.+)$" $bearer_token;
    }

    server {
        listen 8080;
        server_name localhost;

        # ---- Token endpoint ----
        location /v1/token {
            proxy_pass http://security_upstream/v1/token;
            proxy_set_header Host $host;
            proxy_set_header Content-Type application/json;
        }

        # ---- Upload endpoint ----
        location /v1/upload {
            auth_request /validate_token;
            proxy_pass http://uploader_upstream/v1/upload;
            proxy_set_header Host $host;
            proxy_set_header Authorization $http_authorization;
            proxy_set_header Content-Type octet/stream;
            client_max_body_size 10M;
        }

        # ---- Download endpoint (исправленный) ----
        location ~ ^/v1/user/(.*)$ {
            auth_request /validate_token;
            
            # Используем upstream вместо прямого имени
            proxy_pass http://minio_upstream/data/$1;
            
            # Важные заголовки для MinIO
            proxy_set_header Host storage:9000;
            proxy_set_header Authorization $http_authorization;
            proxy_set_header X-Real-IP $remote_addr;
            
            # Отключаем буферизацию
            proxy_buffering off;
        }

        # ---- Validation endpoint ----
        location = /validate_token {
            internal;
            
            if ($token = "") {
                return 401;
            }
            
            proxy_pass http://security_upstream/v1/token/validation;
            proxy_set_header Host $host;
            proxy_set_header Authorization "Bearer $token";
            proxy_pass_request_body off;
            proxy_set_header Content-Length "";
            proxy_method GET;
        }

        # ---- Error handling ----
        error_page 401 = @unauthorized;
        location @unauthorized {
            return 401 '{"error":"Unauthorized"}\n';
            add_header Content-Type application/json;
        }
    }
}
